version: "2"

linters:
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
        - (*os.File).Close
        - (*compress/gzip.Reader).Close
  enable:
    - copyloopvar
    - errorlint
    - misspell
    - nolintlint
    - prealloc
    - revive
    - unconvert
    - unparam
    - usestdlibvars

formatters:
  enable:
    - gci
    - gofumpt
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/jhayashi1/ascii-tui)
